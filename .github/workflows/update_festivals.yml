name: Monthly Festival Crawler

on:
  schedule:
    # Run on the 1st and 15th of every month at midnight (UTC)
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allows manual trigger from Github UI

jobs:
  update-festivals:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Crawler Script
      run: npm start
      env:
        # Add TourAPI Key here in Github Repository Secrets
        TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data.kml images/
        # Only commit if there are changes
        git diff --staged --quiet || (git commit -m "Auto-update: 축제 공식 포스터 및 일정 동기화 (korean.visitkorea.or.kr)" && git push)
